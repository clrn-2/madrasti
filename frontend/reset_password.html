<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدرستي - إعادة تعيين كلمة السر</title>
  <style>
    html, body, * { box-sizing: border-box; -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1929 0%, #1a237e 100%);
      min-height: 100vh;
      margin: 0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(480px, 96vw);
      background: rgba(18, 40, 74, 0.96);
      border: 1px solid rgba(100, 181, 246, 0.35);
      border-radius: 14px;
      padding: 28px 24px;
    }

    .card-title {
      color: #bbdefb;
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 6px;
      text-align: center;
    }

    .hint {
      color: #90caf9;
      font-size: 0.88rem;
      text-align: center;
      margin-bottom: 20px;
    }

    .step-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .step-bar .dot {
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: rgba(100, 181, 246, 0.2);
      transition: background 0.3s;
    }

    .step-bar .dot.active { background: #1e88e5; }
    .step-bar .dot.done   { background: #4caf50; }

    label {
      display: block;
      color: #90caf9;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(100, 181, 246, 0.35);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(100, 181, 246, 0.7);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #1e88e5, #64b5f6);
      margin-top: 4px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-back {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: #cfd8dc;
      background: rgba(255,255,255,0.07);
      margin-top: 12px;
    }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.ok  { display:block; background: rgba(76,175,80,.18); border: 1px solid rgba(76,175,80,.45); }
    .msg.err { display:block; background: rgba(244,67,54,.15); border: 1px solid rgba(244,67,54,.45); }

    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1 class="card-title">إعادة تعيين كلمة السر</h1>
  <p class="hint" id="hint"></p>

  <!-- Step bar (only for no-token mode) -->
  <div class="step-bar" id="stepBar" style="display:none;">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <!-- Step 1: Enter email/phone -->
  <div class="step" id="s1">
    <label for="identifier">البريد الإلكتروني أو رقم الهاتف</label>
    <input id="identifier" type="text" placeholder="example@email.com أو 07XXXXXXXX" />
    <button class="btn" id="btnSendOtp" onclick="sendOtp()">📨 إرسال كود التحقق</button>
  </div>

  <!-- Step 2: Enter OTP -->
  <div class="step" id="s2">
    <label for="otpCode">كود التحقق</label>
    <input id="otpCode" type="text" placeholder="أدخل الكود الذي وصلك" />
    <button class="btn" id="btnVerifyOtp" onclick="confirmOtp()">✔ تحقق والمتابعة</button>
  </div>

  <!-- Step 3: New password (also used directly in token mode) -->
  <div class="step" id="s3">
    <label for="newPassword">كلمة السر الجديدة</label>
    <input id="newPassword" type="password" placeholder="8 أحرف على الأقل" />
    <label for="confirmPassword">تأكيد كلمة السر</label>
    <input id="confirmPassword" type="password" placeholder="أعد إدخال كلمة السر" />
    <button class="btn" id="btnSave" onclick="savePassword()">💾 حفظ كلمة السر الجديدة</button>
  </div>

  <div id="msg" class="msg"></div>
  <button class="btn-back" onclick="window.location.href='dashboard.html'">← الرجوع للوحة الرئيسية</button>
</div>

<script>
  const API = (typeof API_BASE_URL !== 'undefined') ? API_BASE_URL : 'http://127.0.0.1:8000';
  const urlToken = new URLSearchParams(window.location.search).get('token') || '';
  let otpUnlocked = false;

  // ── helpers ──
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.className = 'msg ' + type;
    el.textContent = text;
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
    el.textContent = '';
  }
  function showStep(n) {
    ['s1','s2','s3'].forEach((id, i) => {
      document.getElementById(id).classList.toggle('active', i + 1 === n);
    });
  }
  function setDot(n, state) {
    const el = document.getElementById('d' + n);
    if (el) el.className = 'dot ' + state;
  }

  // ── Init ──
  if (urlToken) {
    // Token mode: straight to password
    document.getElementById('hint').textContent = 'أدخل كلمة السر الجديدة وحفظها مباشرة.';
    otpUnlocked = true;
    showStep(3);
  } else {
    // No-token mode: start from step 1
    document.getElementById('stepBar').style.display = 'flex';
    document.getElementById('hint').textContent = 'أدخل بريدك الإلكتروني أو رقم هاتفك لإرسال كود التحقق.';
    setDot(1, 'active');
    setDot(2, '');
    setDot(3, '');
    showStep(1);
  }

  // ── Step 1: Send OTP ──
  async function sendOtp() {
    clearMsg();
    const identifier = (document.getElementById('identifier').value || '').trim();
    if (!identifier) { showMsg('أدخل البريد الإلكتروني أو رقم الهاتف', 'err'); return; }

    const btn = document.getElementById('btnSendOtp');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الإرسال...';

    try {
      const res = await fetch(`${API}/auth/password/forgot/request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'فشل إرسال كود التحقق');

      setDot(1, 'done');
      setDot(2, 'active');
      showStep(2);
      document.getElementById('hint').textContent = 'تم الإرسال. أدخل الكود الذي وصلك.';
      showMsg('تم إرسال كود التحقق. تحقق من بريدك أو هاتفك.', 'ok');
    } catch (err) {
      showMsg(err.message || 'حدث خطأ', 'err');
      btn.disabled = false;
      btn.textContent = '📨 إرسال كود التحقق';
    }
  }

  // ── Step 2: Confirm OTP via server ──
  async function confirmOtp() {
    clearMsg();
    const otp = (document.getElementById('otpCode').value || '').trim();
    if (!otp) { showMsg('أدخل كود التحقق الذي وصلك', 'err'); return; }

    const identifier = (document.getElementById('identifier').value || '').trim();
    const btn = document.getElementById('btnVerifyOtp');
    btn.disabled = true;
    btn.textContent = '⏳ جاري التحقق...';

    try {
      const res = await fetch(`${API}/auth/password/forgot/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier, otp_code: otp })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'كود التحقق غير صحيح');

      otpUnlocked = true;
      setDot(2, 'done');
      setDot(3, 'active');
      showStep(3);
      document.getElementById('hint').textContent = 'أدخل الآن كلمة السر الجديدة.';
      clearMsg();
    } catch (err) {
      showMsg(err.message || 'حدث خطأ', 'err');
      btn.disabled = false;
      btn.textContent = '✔ تحقق والمتابعة';
    }
  }

  // ── Step 3: Save password ──
  async function savePassword() {
    clearMsg();

    if (!otpUnlocked) {
      showMsg('يجب التحقق من كود OTP أولاً', 'err');
      return;
    }

    const newPassword     = document.getElementById('newPassword').value || '';
    const confirmPassword = document.getElementById('confirmPassword').value || '';

    if (!newPassword || !confirmPassword) { showMsg('يرجى إدخال كلمة السر الجديدة وتأكيدها', 'err'); return; }
    if (newPassword !== confirmPassword)   { showMsg('كلمتا السر غير متطابقتين', 'err'); return; }

    const identifier = !urlToken ? (document.getElementById('identifier').value || '').trim() : null;
    const otpCode    = !urlToken ? (document.getElementById('otpCode').value || '').trim() : null;

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الحفظ...';

    try {
      const res = await fetch(`${API}/auth/password/forgot/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: urlToken || null,
          identifier: identifier || null,
          otp_code: otpCode || null,
          new_password: newPassword,
          confirm_password: confirmPassword
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'فشل تغيير كلمة السر');

      if (!urlToken) setDot(3, 'done');
      document.getElementById('hint').textContent = '';
      showMsg('✅ تم تغيير كلمة السر بنجاح. جاري التحويل...', 'ok');
      setTimeout(() => { window.location.href = 'dashboard.html?force_login=1'; }, 1500);
    } catch (err) {
      showMsg(err.message || 'حدث خطأ', 'err');
      btn.disabled = false;
      btn.textContent = '💾 حفظ كلمة السر الجديدة';
    }
  }
</script>
</body>
</html>
