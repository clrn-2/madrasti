<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
  <script src="../config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرستي - استرجاع سجلات الفصول</title>
    <style>
        /* Global hidden scrollbars with preserved scrolling */
        html, body, * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        *::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
            background: transparent;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #1a237e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 110px;
        }

        main {
            width: 100%;
            min-height: 100vh;
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }

        h1 {
            color: #64b5f6;
            font-size: 2em;
            margin-bottom: 18px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(100, 181, 246, 0.2);
            border-radius: 14px;
            padding: 20px;
        }

        .terms-list {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .term-item {
            border: 1px solid rgba(100, 181, 246, 0.22);
            border-radius: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            cursor: pointer;
        }

        .term-item.active {
            border-color: #64b5f6;
            background: rgba(100, 181, 246, 0.13);
        }

        .term-meta {
            color: #bbdefb;
            font-size: 0.9em;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            padding: 12px 14px;
            font-weight: 700;
        }

        .ok-btn { background: rgba(76, 175, 80, 0.35); }
        .back-btn { background: linear-gradient(135deg, #ff9800, #ffb74d); }

        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #9be7a1;
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #ffb3ad;
        }

        .empty {
            color: #bbdefb;
            border: 1px dashed rgba(100, 181, 246, 0.35);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .back-wrap {
            margin-top: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <h1>استرجاع سجلات الفصول</h1>

        <section class="card">
            <div id="archivedTermsList" class="terms-list"></div>
            <div class="actions">
                <button class="ok-btn" onclick="restoreSelectedTerm()">استرجاع السجلات المحددة</button>
            </div>
            <div id="restoreMsg"></div>
        </section>

        <div class="back-wrap">
            <button class="back-btn" onclick="goBack()">⬅ العودة إلى تحديث الفصل الدراسي</button>
        </div>
    </main>

    <script>
        const API = (typeof API_BASE_URL !== 'undefined') ? API_BASE_URL : 'http://127.0.0.1:8000';
        const token = localStorage.getItem('auth_token') || '';
        const selectedSchoolId = Number(localStorage.getItem('selected_school_id') || '1');
        let selectedTermKey = '';

        function showMsg(elId, text, type) {
            const el = document.getElementById(elId);
            if (!el) return;
            clearTimeout(el._hideTimer);
            if (!text) {
                el.innerHTML = '';
                return;
            }
            el.innerHTML = `<div class="message ${type}">${text}</div>`;
            if (type === 'success') {
                el._hideTimer = setTimeout(() => {
                    el.innerHTML = '';
                }, 5000);
            }
        }

        function termLabel(term) {
            return term === 'second' ? 'الفصل الثاني' : 'الفصل الأول';
        }

        async function apiGet(url) {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.detail || 'فشل العملية');
            return data;
        }

        async function loadArchivedTerms() {
            try {
                const data = await apiGet(`${API}/admin/attendance/terms?school_id=${selectedSchoolId}`);
                const allTerms = Array.isArray(data.terms) ? data.terms : [];
                const archivedTerms = allTerms.filter(item => Number(item.archived_submissions || 0) > 0);
                const list = document.getElementById('archivedTermsList');

                if (!archivedTerms.length) {
                    selectedTermKey = '';
                    list.innerHTML = '<div class="empty">لا توجد سجلات مؤرشفة للاسترجاع حاليًا.</div>';
                    return;
                }

                list.innerHTML = archivedTerms.map(item => {
                    const key = `${item.academic_year}:${item.term}`;
                    const checked = selectedTermKey === key ? 'checked' : '';
                    const activeClass = selectedTermKey === key ? 'active' : '';
                    return `
                        <div class="term-item ${activeClass}" onclick="selectTerm('${item.academic_year}','${item.term}')">
                            <div>
                                <div><strong>سنة ${item.academic_year} – ${termLabel(item.term)}</strong></div>
                                <div class="term-meta">عدد السجلات المؤرشفة: ${item.archived_submissions}</div>
                            </div>
                            <input type="checkbox" ${checked} onclick="event.stopPropagation(); selectTerm('${item.academic_year}','${item.term}')">
                        </div>
                    `;
                }).join('');

                if (!selectedTermKey && archivedTerms[0]) {
                    selectedTermKey = `${archivedTerms[0].academic_year}:${archivedTerms[0].term}`;
                    await loadArchivedTerms();
                }
            } catch (err) {
                showMsg('restoreMsg', `✗ ${err.message}`, 'error');
            }
        }

        function selectTerm(year, term) {
            selectedTermKey = `${year}:${term}`;
            loadArchivedTerms();
        }

        function getSelectedTermData() {
            if (!selectedTermKey) return null;
            const [year, term] = selectedTermKey.split(':');
            return { year: Number(year), term };
        }

        async function restoreSelectedTerm() {
            const selected = getSelectedTermData();
            if (!selected) {
                showMsg('restoreMsg', 'اختر فصلًا مؤرشفًا أولًا.', 'error');
                return;
            }

            try {
                const res = await fetch(`${API}/admin/attendance/archive-term/restore`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ school_id: selectedSchoolId, academic_year: selected.year, term: selected.term })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || 'فشل استرجاع السجلات');

                showMsg('restoreMsg', '✅ تم استرجاع السجلات بنجاح.', 'success');
                selectedTermKey = '';
                await loadArchivedTerms();
            } catch (err) {
                showMsg('restoreMsg', `✗ ${err.message}`, 'error');
            }
        }

        function goBack() {
            window.location.href = '../manage-term/';
        }

        async function init() {
            if (!token) {
                showMsg('restoreMsg', 'يرجى تسجيل الدخول أولًا.', 'error');
                return;
            }
            await loadArchivedTerms();
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
