<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدرستي - نسيت كلمة السر</title>
  <style>
        /* Global hidden scrollbars with preserved scrolling */
        html, body, * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        *::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
            background: transparent;
        }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#0a1929 0%,#1a237e 100%); min-height:100vh; margin:0; color:#fff; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { width:min(520px,96vw); background:rgba(18,40,74,.96); border:1px solid rgba(100,181,246,.35); border-radius:14px; padding:20px; }
    h1 { margin:0 0 14px; font-size:1.3rem; color:#bbdefb; }
    p { color:#cfd8dc; margin:0 0 14px; }
    label { display:block; margin-bottom:6px; color:#90caf9; font-weight:600; }
    input { width:100%; box-sizing:border-box; padding:12px; border-radius:10px; border:1px solid rgba(100,181,246,.35); background:rgba(255,255,255,.06); color:#fff; }
    button { width:100%; margin-top:12px; padding:12px; border:none; border-radius:10px; background:linear-gradient(135deg,#1e88e5,#64b5f6); color:#fff; font-weight:700; cursor:pointer; }
    .secondary { background:rgba(255,255,255,.12); }
    .msg { margin-top:12px; padding:10px; border-radius:10px; display:none; }
    .msg.ok { display:block; background:rgba(76,175,80,.18); border:1px solid rgba(76,175,80,.45); }
    .msg.err { display:block; background:rgba(244,67,54,.15); border:1px solid rgba(244,67,54,.45); }
    .helper { margin-top:12px; display:flex; gap:10px; }
    .helper button { margin-top:0; width:auto; padding:10px 14px; }
    a { color:#90caf9; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 نسيت كلمة السر</h1>
    <p>أدخل بريدك الإلكتروني أو رقم هاتفك لإعادة تعيين كلمة السر</p>

    <label for="identifier">البريد الإلكتروني أو رقم الهاتف</label>
    <input id="identifier" type="text" placeholder="example@email.com أو 07XXXXXXXX" />

    <button onclick="sendResetRequest()">إرسال رابط / كود إعادة التعيين</button>
    <div class="helper">
      <button class="secondary" onclick="goLogin()">العودة لتسجيل الدخول</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const API = (typeof API_BASE_URL !== 'undefined') ? API_BASE_URL : 'http://127.0.0.1:8000';

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = `msg ${type}`;
      el.innerHTML = text;
    }

    async function sendResetRequest() {
      const identifier = (document.getElementById('identifier').value || '').trim();
      if (!identifier) {
        showMsg('أدخل البريد الإلكتروني أو رقم الهاتف', 'err');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/password/forgot/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'فشل طلب إعادة التعيين');
const html = 'تم إرسال رابط/كود إعادة التعيين، يرجى التحقق من بريدك أو هاتفك.';

        showMsg(html, 'ok');
      } catch (err) {
        showMsg(err.message || 'حدث خطأ', 'err');
      }
    }

    function goLogin() {
      window.location.href = 'dashboard.html?force_login=1';
    }
  </script>
</body>
</html>
